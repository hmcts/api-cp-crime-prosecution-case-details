openapi: 3.1.0
servers:
  - description: APIHub API Auto Mocking Crime Prosecution Case Details
    url: https://virtserver.swaggerhub.com/HMCTS-DTS/api-cp-crime-prosecution-case-details/0.0.0

info:
  title: AMP API for Crime Prosecution Case Details
  description: AMP API providing the Crime Prosecution Case Details
  version: 0.0.0
  contact:
    email: no-reply@hmcts.com
  license:
    name: MIT
    url: 'https://opensource.org/licenses/MIT'

tags:
  - name: Case Details
    description: Case Details API
paths:
  /cases/{case_urn}:
    get:
      tags:
        - Case Details
      description: Retrieve details of a crime prosecution case details by case URN.
      operationId: getCaseDetailsByCaseUrn
      parameters:
        - in: path
          name: case_urn
          required: true
          description: Unique reference number for the case
          schema:
            type: string

      responses:
        '200':
          description:  Case found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseDetailResponse"
              examples:
                Example:
                  summary: Case Detail
                  value:
                    caseStatus: "ACTIVE"
                    reportingRestrictions: false
        '400':
          description: Bad input parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '404':
          description: Case Not Found

components:
  schemas:
    CaseDetailResponse:
      type: object
      properties:
        caseStatus:
          type: string
        reportingRestrictions:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          additionalProperties: true
          description: Additional error context
        timestamp:
          type: string
          format: date-time
        traceId:
          type: string
          description: Unique identifier for error tracing
